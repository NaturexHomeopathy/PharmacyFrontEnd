<div class="forgot-bg">

  <div class="forgot-card">

    <h2>Reset Password</h2>

    <!-- EMAIL -->
    <input
      type="email"
      placeholder="Enter your email"
      [(ngModel)]="email"
    />

    <button
      class="send-btn"
      [disabled]="isLoading"
      (click)="sendOtp()">
      Send OTP
    </button>

    <!-- OTP + NEW PASSWORD -->
    <div *ngIf="otpSent" class="otp-section">

      <input
        maxlength="6"
        placeholder="Enter OTP"
        [(ngModel)]="otp"
      />

      <input
        type="password"
        placeholder="New Password"
        [(ngModel)]="newPassword"
      />

      <button
        class="reset-btn"
        [disabled]="isLoading"
        (click)="resetPassword()">
        Reset Password
      </button>

    </div>

    <!-- MESSAGES -->
    <p class="success" *ngIf="successMsg">{{ successMsg }}</p>
    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <!-- BACK TO LOGIN -->
    <div class="login-link">
      Remember your password?
      <a routerLink="/login">Login</a>
    </div>

  </div>

</div>
